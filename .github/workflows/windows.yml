name: Windows

on:
  push:
    branches: ["main", "codex/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            node_arch: x64
            python_arch: x64
            worker_arch: x64
          - arch: arm64
            runner: windows-11-arm
            node_arch: arm64
            # PyTorch does not publish stable Windows ARM64 wheels. The app
            # shell remains native ARM64 while its x64 worker runs through the
            # Windows 11 x64-emulation layer.
            python_arch: x64
            worker_arch: x64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          architecture: ${{ matrix.node_arch }}
          cache: npm

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch }}

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CPU brain runtime
        run: python -m pip install -r engine/requirements.txt

      - name: Test brain
        run: npm run test:python:portable

      - name: Test desktop app
        run: npm run test:node

      - name: Build desktop app
        run: npm run build

      - name: Test built desktop UI
        run: npm run test:ui:built

      - name: Build self-contained brain worker
        run: npm run build:engine:win

      - name: Smoke self-contained brain worker
        shell: pwsh
        run: |
          ./scripts/smoke-engine.ps1 `
            -Executable ./engine-dist/omni-engine/omni-engine.exe `
            -BrainRoot "${{ runner.temp }}/omni-worker-${{ matrix.arch }}"

      - name: Package signed-ready Windows installer and archive
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win nsis zip --${{ matrix.arch }} --publish never

      - name: Smoke ZIP, silent NSIS install, and installed worker
        shell: pwsh
        run: |
          ./scripts/smoke-windows-package.ps1 `
            -Arch "${{ matrix.arch }}" `
            -ExpectedWorkerArch "${{ matrix.worker_arch }}" `
            -ReleaseRoot ./release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: omni-agi-studio-windows-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.zip
            release/windows-package-smoke-*.json
