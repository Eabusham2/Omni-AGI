name: Windows

on:
  push:
    branches: ["main", "codex/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CPU brain runtime
        run: python -m pip install -r engine/requirements.txt

      - name: Test brain
        run: npm run test:python:portable

      - name: Test and build desktop app
        run: |
          npm run test:node
          npm run build

      - name: Build self-contained brain worker
        run: npm run build:engine:win

      - name: Smoke self-contained brain worker
        shell: pwsh
        run: |
          ./scripts/smoke-engine.ps1 `
            -Executable ./engine-dist/omni-engine/omni-engine.exe `
            -BrainRoot "${{ runner.temp }}/omni-worker-${{ matrix.arch }}"

      - name: Package signed-ready Windows installer and archive
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win nsis zip --${{ matrix.arch }} --publish never

      - name: Smoke ZIP, silent NSIS install, and installed worker
        shell: pwsh
        run: |
          ./scripts/smoke-windows-package.ps1 `
            -Arch "${{ matrix.arch }}" `
            -ReleaseRoot ./release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-agi-studio-windows-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.zip
            release/windows-package-smoke-*.json
